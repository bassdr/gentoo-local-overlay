## Installed by media-video/pipewire[system-service] on OpenRC.
## Disables session-bus-dependent features that cannot work when WirePlumber
## runs as a system user (no session D-Bus, no logind seat, no portal).
## This mirrors WirePlumber's built-in mixin.systemwide-session profile.

wireplumber.profiles = {
  main = {
    ## Disable session D-Bus (pipewire user has no session bus; autolaunch fails)
    support.dbus = disabled

    ## Features that require the session D-Bus
    support.reserve-device = disabled
    monitor.alsa.reserve-device = disabled
    support.portal-permissionstore = disabled
    script.client.access-portal = disabled
    support.mpris = disabled
    api.notifications = disabled

    ## No logind seat for system users
    support.logind = disabled
    monitor.bluez.seat-monitoring = disabled
  }
}
